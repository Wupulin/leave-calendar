<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>內科專科護理師排班系統</title><link rel="stylesheet" href="styles.css?v=20260716a"></head><body>
<header><div><small>MONTHLY LEAVE PLANNER</small><h1>內科專科護理師排班系統</h1><p id="who">尚未登入</p></div><div class="actions"><button id="myBookingsBtn">我的預約</button><button id="pinBtn">更換 PIN</button><button id="adminBtn">管理設定</button><button id="logoutBtn">登出</button></div></header>
<main><section class="phasebar"><div class="tabs"><button data-phase="1">第一階段</button><button data-phase="2">第二階段</button><button data-phase="3">長假預約</button></div><h2 id="phaseTitle"></h2><p id="phaseHint"></p></section>
<section class="toolbar"><button id="prev">‹</button><h2 id="monthTitle"></h2><button id="next">›</button><button id="printBtn">列印 A4</button><button id="excelBtn">匯出 Excel</button></section>
<section class="calendar"><div class="week"><b>日</b><b>一</b><b>二</b><b>三</b><b>四</b><b>五</b><b>六</b></div><div id="days" class="days"></div></section>
<section class="summary"><span><span id="uniqueLabel">本月預約成員</span> <b id="uniqueCount">0</b> 人</span><span>超額日期 <b id="overCount">0</b> 天<span id="overDetails"></span></span></section></main>

<dialog id="loginDlg"><form id="loginForm"><h2>成員身分驗證</h2><p>登入後只能以自己的姓名預約。</p><label>姓名<select id="loginMember"></select></label><label>個人 PIN<input id="loginPin" type="password" inputmode="numeric" maxlength="5" required></label><p class="error" id="loginError"></p><button class="primary">登入</button><small>預設 PIN：00000</small></form></dialog>
<dialog id="dayDlg"><div class="modal-head"><div><small id="dayPhase"></small><h2 id="dayTitle"></h2><p id="dayNote"></p></div><button class="close" data-close="dayDlg">×</button></div><div id="capacity"></div><div id="bookingList"></div><section id="longOptions"><label>長假天數（不含假日，最多 7 天）<select id="longDays"><option value="7">7 天</option><option value="6">6 天</option><option value="5">5 天</option><option value="4">4 天</option><option value="3">3 天</option><option value="2">2 天</option><option value="1">1 天</option></select></label><p id="longPreview"></p></section><section id="adminAdjust"><h3>管理員調整</h3><button id="holidayToggle" type="button">切換假日</button><label>日期備註<textarea id="dateNoteInput" rows="2" maxlength="80" placeholder="輸入要顯示在日曆上的備註"></textarea></label><button id="saveDateNote" type="button">儲存備註</button><select id="adjustMember"></select><button id="adminAdd">加入預約</button></section><button id="reserveBtn" class="primary"></button></dialog>
<dialog id="pinDlg"><form id="pinForm"><button type="button" class="close" data-close="pinDlg">×</button><h2>更換個人 PIN</h2><label>目前 PIN<input id="oldPin" type="password" maxlength="5" required></label><label>新 PIN<input id="newPin" type="password" maxlength="5" required></label><label>再次輸入<input id="confirmPin" type="password" maxlength="5" required></label><p class="error" id="pinError"></p><button class="primary">確認更換</button></form></dialog>
<dialog id="myBookingsDlg"><div class="modal-head"><div><small>MY BOOKINGS</small><h2>我的預約日期</h2></div><button class="close" data-close="myBookingsDlg">×</button></div><div id="myBookingsList"></div></dialog>
<dialog id="adminDlg"><div class="modal-head"><h2>管理設定</h2><button class="close" data-close="adminDlg">×</button></div><div class="grid"><label>開放預約月份<input id="bookingMonth" type="month"></label><label>第一階段截止日<input id="p1End" type="date"></label><label>第二階段開始日<input id="p2Start" type="date"></label><label>第二階段截止日<input id="p2End" type="date"></label><label>長假預約開始日<input id="p3Start" type="date"></label><label>長假預約截止日<input id="p3End" type="date"></label><label>長假開始月份<input id="longStart" type="month"></label><label>長假結束月份<input id="longEnd" type="month"></label><label>第一階段「假日前後」上限<input id="p1Max" type="number" min="1"></label><label>第一階段總上限（含假日前後＋其他）<input id="p1OtherMax" type="number" min="1"></label><label>每月可預假總天數（第一＋第二階段）<input id="p2Max" type="number" min="1"></label><label>ICU 每日名額<input id="icuMax" type="number" min="1"></label><label>病房每日名額<input id="wardMax" type="number" min="1"></label></div><h3>成員與唯一管理員</h3><div id="memberRows"></div><div class="addrow"><input id="newName" placeholder="新增成員姓名"><select id="newGroup"><option>ICU</option><option>病房</option></select><button id="addMember">新增</button></div><div class="admin-actions"><label class="clear-month">清除月份<input id="clearMonth" type="month"></label><button id="clearBookings" class="danger" type="button">清除該月份預約資料</button><button id="saveAdmin" class="primary">儲存設定</button></div></dialog>
<div id="toast"></div><script src="supabase-config.js?v=20260715c"></script><script src="app.js?v=20260717e"></script></body></html>
